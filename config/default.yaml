paths:
  raw_data: data/raw
  vintage_data: data/vintages
  processed_data: data/processed
  reference_data: data/reference
  reports: reports
  outputs: outputs

data_mode: latest_available
series_registry_path: config/series_registry.yaml

realtime:
  use_vintages: true
  release_lags: true
  estimation_window: expanding

models:
  multivariate:
    enabled: true
    targets:
      - within_3m
      - within_6m
      - within_12m
      - current_recession
    features:
      - term_spread
      - DTB3
      - BAMLH0A0HYM2
      - sahm_gap
      - UNRATE
      - PAYEMS_growth_3m_ann
      - AMTMNO_change_3m
      - US_OECD_CLI_growth_3m
      - equity_drawdown_6m
  regularized_logit:
    enabled: true
    targets:
      - within_3m
      - within_6m
      - within_12m
      - current_recession
    features:
      - term_spread
      - DTB3
      - BAMLH0A0HYM2
      - sahm_gap
      - UNRATE
      - PAYEMS_growth_3m_ann
      - AMTMNO_change_3m
      - US_OECD_CLI_growth_3m
      - equity_drawdown_6m
    penalty: elasticnet
    alpha: 0.1
    l1_ratio: 0.5
  tree_models:
    enabled: false
    targets:
      - within_3m
      - within_6m
      - within_12m
      - current_recession
    features:
      - term_spread
      - DTB3
      - BAMLH0A0HYM2
      - sahm_gap
      - UNRATE
      - PAYEMS_growth_3m_ann
      - AMTMNO_change_3m
      - US_OECD_CLI_growth_3m
      - equity_drawdown_6m
    n_estimators: 100
    learning_rate: 0.05
    max_depth: 2
    random_state: 42
  ensemble:
    enabled: true
    members:
      - yield_curve_logit
      - hy_credit_logit
      - multivariate_logit
      - regularized_logit

series:
  DGS10:
    frequency: daily
  DTB3:
    frequency: daily
  UNRATE:
    frequency: monthly
  BAMLH0A0HYM2:
    frequency: daily
  PAYEMS:
    frequency: monthly
  AMTMNO:
    frequency: monthly
  USALOLITOAASTSAM:
    frequency: monthly
  SPASTT01USM661N:
    frequency: monthly

aggregation:
  default: mean
  options:
    - mean
    - eom

horizons:
  - 3
  - 6
  - 12
primary_horizon: 12

splits:
  yield_curve:
    train_end: "1989-12-01"
    test_start: "1990-01-01"
  hy_credit:
    train_end: "2006-12-01"
    test_start: "2007-01-01"
  expanded_forecast:
    train_end: "2006-12-01"
    test_start: "2007-01-01"
  expanded_current:
    train_end: "2006-12-01"
    test_start: "2007-01-01"
  sahm:
    test_start: "1990-01-01"

thresholds:
  inversion: 0.0
  sahm: 0.5
  probability: 0.5

evaluation:
  thresholds:
    - 0.15
    - 0.25
    - 0.35
    - 0.5
  event_windows_months:
    - 3
    - 6
    - 12
  calibration:
    enabled: true
    method: platt
    validation_months: 24
    min_validation_months: 12
  minimum_history:
    min_train_months: 60
    min_positive_cases: 2
    min_negative_cases: 12
  selection_gates:
    min_auc: 0.65
    min_episode_recall: 0.5
    max_ece: 0.15
    max_false_alarm_streak:
      current_recession: 12
      within_3m: 18
      within_6m: 24
      within_12m: 36

reporting:
  include_current_snapshot: true
  include_event_scorecards: true
  include_portfolio_interpretation: true
  snapshot_modes:
    - latest_available
    - realtime
  material_difference_threshold: 0.1
  regime_buckets:
    - label: low risk
      max_probability: 0.15
    - label: rising risk
      max_probability: 0.35
    - label: elevated risk
      max_probability: 0.60
    - label: high / imminent risk
      max_probability: 1.00
